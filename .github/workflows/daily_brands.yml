name: Daily Brands Pipeline

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Run date in UTC (YYYY-MM-DD). Leave blank for today."
        required: false
        type: string
  schedule:
    - cron: "10 9 * * *"   # 05:10 ET daily

permissions:
  contents: read
  id-token: write

concurrency:
  group: daily-brands
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET: risk-dashboard
      PYTHONPATH: ${{ github.workspace }}  # Allows 'from storage_utils import ...'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            requirements.txt
            scripts/
            storage_utils.py
            .github/
          sparse-checkout-cone-mode: false

      # Debug: verify files were checked out
      - name: Verify checkout
        run: |
          echo "📂 Workspace: ${{ github.workspace }}"
          echo "📂 Files in workspace:"
          ls -la
          echo ""
          echo "📂 Files in scripts/:"
          ls -la scripts/
          echo ""
          echo "✅ storage_utils.py exists:" && test -f storage_utils.py && echo "YES" || echo "NO"
          echo "📍 PYTHONPATH: $PYTHONPATH"

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCS access
        run: |
          echo "Testing GCS access..."
          gsutil ls gs://$GCS_BUCKET/rosters/ || echo "Warning: Could not list rosters"

      - name: Build brand articles (→ GCS)
        id: build_brand_articles
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          LOG_FILE="$(mktemp)"
          echo "🚀 Running news_articles_brands.py for ${DATE_TO_RUN}"
          echo "📦 Batch size: 1500 (all companies in one run)"
          python scripts/news_articles_brands.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET" \
            --batch-size 1500 2>&1 | tee "$LOG_FILE"

          DB_ROWS="$(grep -Eo 'DB upserted [0-9]+ brand article rows' "$LOG_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
          if [ -z "${DB_ROWS:-}" ]; then
            DB_ROWS="unknown"
          fi
          echo "db_rows=$DB_ROWS" >> "$GITHUB_OUTPUT"

      - name: Aggregate brand news sentiment (→ GCS)
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          echo "📊 Running news_sentiment_brands.py for ${DATE_TO_RUN}"
          python scripts/news_sentiment_brands.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET"

      - name: Backfill brand daily mentions (safety)
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          echo "🧩 Backfilling company_article_mentions_daily for ${DATE_TO_RUN}"
          python scripts/backfill_article_mentions_daily.py \
            --date "${DATE_TO_RUN}" \
            --entity-type company

      - name: Process brand SERPs (→ GCS)
        id: process_brand_serps
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          LOG_FILE="$(mktemp)"
          echo "🔍 Processing brand SERPs for ${DATE_TO_RUN}"
          python scripts/process_serps_brands.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET" 2>&1 | tee "$LOG_FILE"

          DB_ROWS="$(grep -Eo 'DB upserted [0-9]+ brand SERP rows' "$LOG_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
          if [ -z "${DB_ROWS:-}" ]; then
            DB_ROWS="unknown"
          fi
          echo "db_rows=$DB_ROWS" >> "$GITHUB_OUTPUT"

      - name: Refresh SERP daily counts MV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "🔁 Refreshing serp_daily_counts_mv"
          python scripts/refresh_negative_summary_view.py --serp-counts

      - name: Summary
        if: always()
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          DATE_TO_USE="${RUN_DATE:-$(date -u +%F)}"
          
          echo "### Daily Brands Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** ${DATE_TO_USE}" >> $GITHUB_STEP_SUMMARY
          echo "☁️ **Bucket:** gs://$GCS_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### Files written to GCS:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_articles/${DATE_TO_USE}*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No article files found" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/daily_counts/brand*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No daily counts found" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_serps/${DATE_TO_USE}*brand*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No SERP files found" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "#### DB rows upserted:" >> $GITHUB_STEP_SUMMARY
          echo "- Brand article rows: ${{ steps.build_brand_articles.outputs.db_rows }}" >> $GITHUB_STEP_SUMMARY
          echo "- Brand SERP rows: ${{ steps.process_brand_serps.outputs.db_rows }}" >> $GITHUB_STEP_SUMMARY

          echo "#### SERP unmapped queries:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_serps/mismatches/${DATE_TO_USE}-brand-serps-unmapped.csv" \
            >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No unmapped queries file" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
