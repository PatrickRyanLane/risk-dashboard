name: Send Crisis Alerts

on:
  schedule:
    - cron: '0 13 * * *'  # 13:00 UTC daily (after aggregation)
  workflow_dispatch:
    inputs:
      force_brands:
        description: "Optional comma-separated company names to restrict alerts."
        required: false
        default: ""
      force_send:
        description: "Set to 1 to bypass gates/cooldown/date window/budget (requires force_brands)."
        required: false
        default: "0"

permissions:
  contents: read
  id-token: write

jobs:
  alerts:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            requirements.txt
            scripts/
            storage_utils.py
            .github/
          sparse-checkout-cone-mode: false

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Send Crisis Alerts (Slack + Salesforce)
        env:
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_ACTION_VALUE_SIGNING_SECRET: ${{ secrets.SLACK_ACTION_VALUE_SIGNING_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_MAX_CALLS: ${{ vars.LLM_MAX_CALLS }}
          LLM_SUMMARY_MAX_CALLS: ${{ vars.LLM_SUMMARY_MAX_CALLS }}
          ALERT_BRANDS: ${{ vars.ALERT_BRANDS || '1' }}
          ALERT_CEOS: ${{ vars.ALERT_CEOS || '1' }}
          SERP_GATE_ENABLED: ${{ vars.SERP_GATE_ENABLED || '0' }}
          SERP_TOP_STORIES_REQUIRED: ${{ vars.SERP_TOP_STORIES_REQUIRED || '1' }}
          SERP_TOP_STORIES_NEG_MIN: ${{ vars.SERP_TOP_STORIES_NEG_MIN || '4' }}
          SERP_GATE_MIN: ${{ vars.SERP_GATE_MIN || '1' }}
          SERP_GATE_DAYS: ${{ vars.SERP_GATE_DAYS || '2' }}
          SERP_GATE_DEBUG: ${{ vars.SERP_GATE_DEBUG || '1' }}
          ALERT_LOOKBACK_DAYS: ${{ vars.ALERT_LOOKBACK_DAYS || '1' }}
          TOP_STORIES_TODAY_ONLY: ${{ vars.TOP_STORIES_TODAY_ONLY || '1' }}
          ALERT_TIMEZONE: ${{ vars.ALERT_TIMEZONE || 'America/New_York' }}
          FORCE_BRANDS: ${{ github.event.inputs.force_brands || '' }}
          FORCE_SEND: ${{ github.event.inputs.force_send || '0' }}
        run: |
          echo "🚀 Checking for crises and sending alerts..."
          python scripts/send_crisis_alerts.py --force-brands "$FORCE_BRANDS" --force-send "$FORCE_SEND"
