name: Backfill Brand & CEO Articles

on:
  workflow_dispatch:
    inputs:
      start:
        description: "Start date (YYYY-MM-DD)"
        required: true
        default: "2026-01-01"
      end:
        description: "End date (YYYY-MM-DD, defaults to today)"
        required: false
      data_dir:
        description: "Historical article CSV location (local path or gs:// prefix)"
        required: false
        default: "gs://risk-dashboard/data"

permissions:
  contents: read
  id-token: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      GCS_BUCKET: risk-dashboard
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            requirements.txt
            scripts/
            storage_utils.py
            .github/
          sparse-checkout-cone-mode: false

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Backfill articles from processed CSVs (→ DB)
        env:
          START: ${{ github.event.inputs.start }}
          ENDIN: ${{ github.event.inputs.end }}
          DATA_DIR: ${{ github.event.inputs.data_dir }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          END_DATE="${ENDIN:-$(date -u +%F)}"
          python scripts/backfill_articles_from_processed_csv.py \
            --data-dir "${DATA_DIR:-gs://$GCS_BUCKET/data}" \
            --from "$START" \
            --to "$END_DATE" \
            --entity-type both

      - name: Refresh article daily counts MV
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "🔁 Refreshing article_daily_counts_mv"
          python scripts/refresh_negative_summary_view.py --article-counts

      - name: Summary
        if: always()
        env:
          START_IN: ${{ github.event.inputs.start }}
          END_IN: ${{ github.event.inputs.end }}
          DATA_DIR_IN: ${{ github.event.inputs.data_dir }}
        run: |
          START_DATE="${START_IN:-manual}"
          END_DATE="${END_IN:-$(date -u +%F)}"
          echo "### Backfill Articles Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Range:** ${START_DATE} to ${END_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Source:** ${DATA_DIR_IN:-gs://$GCS_BUCKET/data}" >> $GITHUB_STEP_SUMMARY
