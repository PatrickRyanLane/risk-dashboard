name: Daily CEO Pipeline

on:
  schedule:
    - cron: "10 10 * * *"   # 06:10 ET (one hour after brands)
  workflow_dispatch:
    inputs:
      date:
        description: "Run date in UTC (YYYY-MM-DD). Leave blank for today."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: daily-ceos
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: '1'
      TZ: America/New_York
      GCS_BUCKET: risk-dashboard
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            requirements.txt
            scripts/
            storage_utils.py
            .github/
          sparse-checkout-cone-mode: false

      - name: Verify checkout
        run: |
          echo "📂 Workspace: ${{ github.workspace }}"
          ls -la
          echo "✅ storage_utils.py exists:" && test -f storage_utils.py && echo "YES" || echo "NO"

      - name: Setup Python environment
        uses: ./.github/actions/setup-python-env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCS_SERVICE_ACCOUNT_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCS access
        run: |
          echo "Testing GCS access..."
          gsutil ls gs://$GCS_BUCKET/rosters/ || echo "Warning: Could not list rosters"

      - name: Sync roster entities to DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "🔁 Syncing companies/CEOs from roster into DB"
          python scripts/ingest_roster_only.py \
            --roster-path "gs://$GCS_BUCKET/rosters/main-roster.csv" \
            --boards-path ""

      - name: Build daily CEO articles (→ GCS)
        id: build_ceo_articles
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          ARTICLES_MAX_PER_ALIAS: "25"
          ARTICLES_SLEEP_SEC: "0.35"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          LOG_FILE="$(mktemp)"
          echo "🚀 Running news_articles_ceos.py for ${DATE_TO_RUN}"
          python scripts/news_articles_ceos.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET" \
            --batch-size 1500 2>&1 | tee "$LOG_FILE"

          DB_ROWS="$(grep -Eo 'DB upserted [0-9]+ CEO article rows' "$LOG_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
          if [ -z "${DB_ROWS:-}" ]; then
            DB_ROWS="unknown"
          fi
          echo "db_rows=$DB_ROWS" >> "$GITHUB_OUTPUT"

      - name: Run daily CEO sentiment (→ GCS)
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          echo "📊 Running news_sentiment_ceos.py for ${DATE_TO_RUN}"
          python scripts/news_sentiment_ceos.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET"

      - name: Backfill CEO daily mentions (safety)
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          echo "🧩 Backfilling ceo_article_mentions_daily for ${DATE_TO_RUN}"
          python scripts/backfill_article_mentions_daily.py \
            --date "${DATE_TO_RUN}" \
            --entity-type ceo

      - name: Process CEO SERPs (→ GCS)
        id: process_ceo_serps
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          DATE_TO_RUN="${RUN_DATE:-$(date -u +%F)}"
          LOG_FILE="$(mktemp)"
          echo "🔍 Processing CEO SERPs for ${DATE_TO_RUN}"
          python scripts/process_serps_ceos.py \
            --date "${DATE_TO_RUN}" \
            --bucket "$GCS_BUCKET" 2>&1 | tee "$LOG_FILE"

          DB_ROWS="$(grep -Eo 'DB upserted [0-9]+ CEO SERP rows' "$LOG_FILE" | tail -n1 | grep -Eo '[0-9]+' || true)"
          if [ -z "${DB_ROWS:-}" ]; then
            DB_ROWS="unknown"
          fi
          echo "db_rows=$DB_ROWS" >> "$GITHUB_OUTPUT"

          python - "$LOG_FILE" "$GITHUB_OUTPUT" <<'PY'
          import re
          import sys

          log_path, out_path = sys.argv[1], sys.argv[2]
          text = open(log_path, encoding="utf-8", errors="ignore").read()

          def last(pattern: str) -> str:
              vals = re.findall(pattern, text)
              return vals[-1] if vals else "unknown"

          metrics = {
              "raw_queries": last(r"\braw_queries=(\d+)"),
              "raw_organic_rows": last(r"\braw_organic_rows=(\d+)"),
              "mapped_queries": last(r"\bmapped_queries=(\d+)"),
              "mapped_rows": last(r"\bmapped_rows=(\d+)"),
          }
          with open(out_path, "a", encoding="utf-8") as f:
              for key, val in metrics.items():
                  f.write(f"{key}={val}\n")
          PY

      - name: Refresh article + SERP daily counts MVs
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          echo "🔁 Refreshing article_daily_counts_mv + serp_daily_counts_mv"
          python scripts/refresh_negative_summary_view.py --article-counts --serp-counts

      - name: Summary
        if: always()
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
        run: |
          DATE_TO_USE="${RUN_DATE:-$(date -u +%F)}"
          
          echo "### Daily CEO Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📅 **Date:** ${DATE_TO_USE}" >> $GITHUB_STEP_SUMMARY
          echo "☁️ **Bucket:** gs://$GCS_BUCKET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### Files written to GCS:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_articles/${DATE_TO_USE}*ceo*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No CEO article files" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/daily_counts/ceo*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No CEO counts" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_serps/${DATE_TO_USE}*ceo*" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No CEO SERP files" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

          echo "#### DB rows upserted:" >> $GITHUB_STEP_SUMMARY
          echo "- CEO article rows: ${{ steps.build_ceo_articles.outputs.db_rows }}" >> $GITHUB_STEP_SUMMARY
          echo "- CEO SERP rows: ${{ steps.process_ceo_serps.outputs.db_rows }}" >> $GITHUB_STEP_SUMMARY

          echo "#### SERP source/mapping metrics:" >> $GITHUB_STEP_SUMMARY
          echo "- Raw queries: ${{ steps.process_ceo_serps.outputs.raw_queries }}" >> $GITHUB_STEP_SUMMARY
          echo "- Raw organic rows: ${{ steps.process_ceo_serps.outputs.raw_organic_rows }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mapped queries: ${{ steps.process_ceo_serps.outputs.mapped_queries }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mapped rows: ${{ steps.process_ceo_serps.outputs.mapped_rows }}" >> $GITHUB_STEP_SUMMARY

          echo "#### SERP unresolved queries:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gsutil ls -l "gs://$GCS_BUCKET/data/processed_serps/mismatches/${DATE_TO_USE}-ceo-serps-unresolved.csv" \
            >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No unresolved queries file" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
